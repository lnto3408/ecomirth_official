<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Card shape (white, slightly transparent) -->
  <rect x="80" y="100" width="352" height="280" rx="24" fill="white" opacity="0.95"/>
  <!-- Bar chart -->
  <rect x="130" y="260" width="52" height="80" rx="8" fill="url(#bar1)"/>
  <rect x="202" y="210" width="52" height="130" rx="8" fill="url(#bar2)"/>
  <rect x="274" y="170" width="52" height="170" rx="8" fill="url(#bar3)"/>
  <rect x="346" y="220" width="52" height="120" rx="8" fill="url(#bar1)"/>
  <!-- Trend line -->
  <polyline points="156,240 228,195 300,155 372,200" fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on trend line -->
  <circle cx="156" cy="240" r="8" fill="#6366f1"/>
  <circle cx="228" cy="195" r="8" fill="#6366f1"/>
  <circle cx="300" cy="155" r="8" fill="#6366f1"/>
  <circle cx="372" cy="200" r="8" fill="#6366f1"/>
  <!-- Title bar dots -->
  <circle cx="116" cy="132" r="8" fill="#ef4444" opacity="0.8"/>
  <circle cx="142" cy="132" r="8" fill="#f59e0b" opacity="0.8"/>
  <circle cx="168" cy="132" r="8" fill="#22c55e" opacity="0.8"/>
  <!-- SNS share icon (bottom right) -->
  <g transform="translate(340, 390)">
    <circle cx="0" cy="0" r="42" fill="white" opacity="0.25"/>
    <circle cx="-12" cy="-8" r="8" fill="white"/>
    <circle cx="16" cy="-18" r="8" fill="white"/>
    <circle cx="16" cy="10" r="8" fill="white"/>
    <line x1="-5" y1="-12" x2="10" y2="-16" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5" y1="-4" x2="10" y2="6" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- News card icon (bottom left) -->
  <g transform="translate(172, 390)">
    <circle cx="0" cy="0" r="42" fill="white" opacity="0.25"/>
    <rect x="-16" y="-20" width="32" height="40" rx="4" fill="none" stroke="white" stroke-width="3.5"/>
    <line x1="-8" y1="-10" x2="8" y2="-10" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="6" x2="4" y2="6" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
